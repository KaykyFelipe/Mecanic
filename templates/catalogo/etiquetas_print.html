<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Etiquetas - Mecanic</title>
    <style>
        @page {
            size: A4;
            margin: 15mm 10mm 15mm 10mm;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
        }
        .etiquetas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            row-gap: 20px;
        }
        .etiqueta-card {
            border: 1px dashed #cccccc;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
            height: 42mm; /* standard size */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            page-break-inside: avoid;
        }
        .etiqueta-header {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666666;
            margin-bottom: 2px;
        }
        .etiqueta-nome {
            font-size: 10px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 2px;
            line-height: 1.1;
            height: 22px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .etiqueta-details {
            font-size: 8px;
            color: #333333;
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 4px;
            margin-bottom: 4px;
        }
        .etiqueta-price {
            font-weight: 700;
            color: #000000;
        }
        .etiqueta-barcode-wrapper {
            margin-top: auto;
        }
        .etiqueta-barcode {
            max-width: 100%;
            height: 35px;
        }
        
        @media print {
            .no-print {
                display: none;
            }
            .etiqueta-card {
                border: 1px dashed transparent; /* hide borders in printing for aesthetic labels */
            }
            body {
                margin: 0;
                padding: 0;
            }
            .print-container {
                margin-top: 0 !important;
            }
        }
        
        /* Floating print control bar */
        .print-control-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #093c66;
            color: white;
            padding: 12px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-print {
            background: #00c2ff;
            color: #093c66;
            border: none;
            padding: 8px 16px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-back {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 7px 14px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
        }
        .print-container {
            margin-top: 70px; /* spacing for control bar */
            padding: 10px;
        }
    </style>
    <!-- JsBarcode library for crisp barcodes generation -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

    <div class="print-control-bar no-print">
        <div style="font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 0.5rem;">
            <span>🖨️ Folha de Impressão de Etiquetas (Mecanic)</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <a href="{% url 'estoque-listar' %}" class="btn-back">⬅ Voltar ao Painel</a>
            <button onclick="window.print()" class="btn-print">Imprimir Etiquetas</button>
        </div>
    </div>

    <div class="print-container">
        <div class="etiquetas-grid">
            {% for produto in produtos %}
            <div class="etiqueta-card">
                <div class="etiqueta-header">Mecanic AutoPeças</div>
                <div class="etiqueta-nome">{{ produto.nome }}</div>
                <div class="etiqueta-details">
                    <span>SKU: {{ produto.sku }}</span>
                    <span class="etiqueta-price">R$ {{ produto.preco_venda|floatformat:2 }}</span>
                </div>
                <div class="etiqueta-barcode-wrapper">
                    <!-- Target for JsBarcode EAN if present, else fallbacks to SKU -->
                    <svg class="etiqueta-barcode" 
                         data-value="{% if produto.codigo_barras_ean %}{{ produto.codigo_barras_ean }}{% else %}{{ produto.sku }}{% endif %}"
                         data-format="{% if produto.codigo_barras_ean %}EAN13{% else %}CODE128{% endif %}">
                    </svg>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Render all barcodes in the sheet
            const barcodes = document.querySelectorAll(".etiqueta-barcode");
            barcodes.forEach(svg => {
                const val = svg.getAttribute("data-value").trim();
                const format = svg.getAttribute("data-format");
                
                if (!val) {
                    svg.outerHTML = "<div style='font-size:7px; color:red;'>Sem Código</div>";
                    return;
                }
                
                try {
                    JsBarcode(svg, val, {
                        format: format,
                        lineColor: "#000",
                        width: 1.4,
                        height: 35,
                        displayValue: true,
                        fontSize: 8,
                        margin: 0
                    });
                } catch (error) {
                    console.error("Erro ao gerar código de barras para: " + val, error);
                    // Fallback to CODE128 in case of invalid EAN13 format
                    try {
                        JsBarcode(svg, val, {
                            format: "CODE128",
                            lineColor: "#000",
                            width: 1.1,
                            height: 35,
                            displayValue: true,
                            fontSize: 8,
                            margin: 0
                        });
                    } catch (e) {
                        svg.outerHTML = "<div style='font-size:7px; color:red;'>Código Inválido</div>";
                    }
                }
            });
            
            // Automatically open printer dialog after short rendering delay
            setTimeout(function() {
                window.print();
            }, 600);
        });
    </script>
</body>
</html>
